# Caddy 反向代理配置示例
#
# 特点：自动 HTTPS，自动申请和续期 Let's Encrypt 证书
#
# 安装位置: /etc/caddy/Caddyfile
# 重载配置: sudo systemctl reload caddy
#
# 将下面的 your-domain.com 改成你的域名

# 基础配置 - 自动 HTTPS
your-domain.com {
    reverse_proxy 127.0.0.1:3001

    # 自定义日志
    log {
        output file /var/log/caddy/fashion-inventory.log {
            roll_size 10MB
            roll_keep 5
        }
    }
}

# 高级配置示例（可选）
# your-domain.com {
#     # 自动 HTTPS（默认启用）
#
#     # 请求体大小限制
#     request_body {
#         max_size 10MB
#     }
#
#     # 反向代理
#     reverse_proxy 127.0.0.1:3001 {
#         # 传递真实 IP
#         header_up X-Real-IP {remote_host}
#         header_up X-Forwarded-Proto {scheme}
#
#         # 健康检查
#         health_uri /api/healthz
#         health_interval 30s
#         health_timeout 5s
#     }
#
#     # 压缩响应
#     encode gzip zstd
#
#     # 访问日志
#     log {
#         output file /var/log/caddy/fashion-inventory.log
#     }
# }

# 多域名配置示例
# admin.your-domain.com {
#     reverse_proxy 127.0.0.1:3001
# }

# HTTP 强制跳转 HTTPS（Caddy 默认已启用）
# http://your-domain.com {
#     redir https://your-domain.com{uri} permanent
# }
