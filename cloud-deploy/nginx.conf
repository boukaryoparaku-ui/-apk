# Nginx 反向代理配置示例
#
# 安装位置: /etc/nginx/sites-available/fashion-inventory
# 启用方法:
#   sudo ln -s /etc/nginx/sites-available/fashion-inventory /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# HTTPS 配置:
#   sudo certbot --nginx -d your-domain.com

# HTTP 配置（Certbot 会自动升级为 HTTPS）
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;  # 改成你的域名或IP

    # 客户端请求体大小限制（用于文件上传）
    client_max_body_size 10M;

    # 访问日志
    access_log /var/log/nginx/fashion-inventory-access.log;
    error_log /var/log/nginx/fashion-inventory-error.log;

    # 反向代理到应用
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # 传递客户端真实信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 健康检查端点（可选 - 用于负载均衡器）
    location /api/healthz {
        proxy_pass http://127.0.0.1:3001/api/healthz;
        access_log off;
    }
}

