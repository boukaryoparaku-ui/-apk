<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>服装供销存</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
        background: #f5f6f8;
        color: #1f2329;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
      }
      .card {
        width: 100%;
        max-width: 380px;
        background: #fff;
        border-radius: 14px;
        padding: 28px 22px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      }
      h1 { font-size: 20px; margin: 0 0 4px; }
      p.sub { margin: 0 0 22px; color: #8a9099; font-size: 13px; }
      label { display: block; font-size: 13px; color: #4a5059; margin-bottom: 6px; }
      input {
        width: 100%;
        height: 46px;
        padding: 0 12px;
        font-size: 16px;
        border: 1px solid #d8dce0;
        border-radius: 9px;
        outline: none;
      }
      input:focus { border-color: #2f6fed; }
      button {
        width: 100%;
        height: 46px;
        margin-top: 16px;
        font-size: 16px;
        font-weight: 600;
        color: #fff;
        background: #2f6fed;
        border: none;
        border-radius: 9px;
      }
      button:active { background: #2257c4; }
      .ghost { background: transparent; color: #2f6fed; font-weight: 500; margin-top: 8px; }
      .ghost:active { background: #eef3fe; }
      .err { color: #d4380d; font-size: 13px; margin-top: 10px; min-height: 18px; }
      .hint { color: #8a9099; font-size: 12px; margin-top: 14px; line-height: 1.6; }
      .connecting { text-align: center; }
      .connecting .url { font-weight: 600; word-break: break-all; margin: 10px 0 4px; }
    </style>
  </head>
  <body>
    <div class="card" id="card"></div>
    <script>
      var KEY = "dooker.serverUrl";
      var card = document.getElementById("card");

      function normalize(raw) {
        var v = (raw || "").trim();
        if (!v) return "";
        if (!/^https?:\/\//i.test(v)) v = "http://" + v;
        return v.replace(/\/+$/, "");
      }

      function go(url) {
        window.location.replace(url + "/");
      }

      function renderConnecting(url) {
        card.innerHTML =
          '<div class="connecting">' +
          "<h1>正在连接服务器</h1>" +
          '<div class="url">' + url + "</div>" +
          '<p class="sub">2 秒后自动进入</p>' +
          '<button id="goNow">立即进入</button>' +
          '<button class="ghost" id="change">更换服务器地址</button>' +
          "</div>";
        document.getElementById("goNow").onclick = function () { go(url); };
        document.getElementById("change").onclick = function () { renderForm(url); };
        window._t = setTimeout(function () { go(url); }, 2000);
      }

      function renderForm(prefill) {
        if (window._t) clearTimeout(window._t);
        card.innerHTML =
          "<h1>设置服务器地址</h1>" +
          '<p class="sub">填写后端访问地址，保存后即可登录使用</p>' +
          "<label>服务器地址</label>" +
          '<input id="url" type="url" inputmode="url" autocapitalize="off" autocorrect="off" ' +
          'placeholder="http://192.168.1.10:3000" value="' + (prefill || "") + '" />' +
          '<button id="save">保存并连接</button>' +
          '<div class="err" id="err"></div>' +
          '<p class="hint">示例：http://192.168.1.10:3000<br/>' +
          "需与服务器在同一局域网。地址保存在本机，下次自动连接。</p>";
        var input = document.getElementById("url");
        var err = document.getElementById("err");
        document.getElementById("save").onclick = function () {
          var url = normalize(input.value);
          if (!url) { err.textContent = "请输入有效地址"; return; }
          try { localStorage.setItem(KEY, url); } catch (e) {}
          go(url);
        };
        input.addEventListener("keydown", function (e) {
          if (e.key === "Enter") document.getElementById("save").click();
        });
        input.focus();
      }

      var saved = "";
      try { saved = localStorage.getItem(KEY) || ""; } catch (e) {}
      if (saved) renderConnecting(saved);
      else renderForm("");
    </script>
  </body>
</html>
