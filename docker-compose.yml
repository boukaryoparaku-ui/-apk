services:
  app:
    build: .
    environment:
      DATABASE_URL: file:/data/data.db
      SESSION_STORE_DIR: /data/sessions
      SESSION_SECRET: change-me-in-production
      AI_CONFIG_SECRET: change-me-too
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      PORT: 3000
      TZ: Asia/Shanghai
    ports:
      - "3001:3000"
    volumes:
      - app_data:/data
    restart: unless-stopped

volumes:
  app_data:
